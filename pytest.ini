[pytest]
DJANGO_SETTINGS_MODULE = project.settings
python_files = tests.py test_*.py *_tests.py
testpaths = .
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

markers =
    django_db: marks tests as requiring database access
    slow: marks tests as slow (deselect with '-m "not slow"')
