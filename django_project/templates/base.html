<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cash Receipts{% endblock %}</title>
    <link rel="stylesheet" href="{% load static %}{% static 'css/normalize.css' %}">
    <link rel="stylesheet" href="{% load static %}{% static 'css/main.css' %}">
</head>
<body>
    <header>
        <nav>
            <a href="{% url 'index' %}">Home</a>
            {% if user.is_authenticated %}
                <a href="{% url 'add_receipt' %}">Add Receipt</a>
                <a href="{% url 'user_profile' user.username %}">My Receipts</a>
                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'signup' %}">Sign Up</a>
            {% endif %}
        </nav>
    </header>

    <main>
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li class="{{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Cash Receipt Analyzer</p>
    </footer>
</body>
</html>
